version: 2

project_name: clem

before:
  hooks:
    - go mod tidy

builds:
  - id: clem
    main: .
    binary: clem
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/jahwag/clem/cmd.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: clem
    name_template: >-
      clem_{{ .Os }}_{{ .Arch }}
    formats:
      - binary

checksum:
  name_template: "checksums.txt"

# SBOM — Syft generates a software bill of materials per binary, published
# alongside the release so downstream consumers can audit dependencies.
sboms:
  - artifacts: binary

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: jahwag
    name: clem
  draft: false
  prerelease: auto
  header: |
    ## clem {{ .Tag }}

    Install or upgrade — pick the matching `clem_<os>_<arch>` asset below:

    ```bash
    # example: linux amd64
    curl -fsSL https://github.com/jahwag/clem/releases/download/{{ .Tag }}/clem_linux_amd64 -o /usr/local/bin/clem
    sudo chmod +x /usr/local/bin/clem
    ```

    Already on clem? Just:

    ```bash
    sudo clem update
    ```
