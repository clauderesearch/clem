name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install sops + age (needed by vault tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y age
          sudo curl -sSL https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64 \
            -o /usr/local/bin/sops
          sudo chmod +x /usr/local/bin/sops
          sops --version | head -1
          age --version

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -v ./...

      - name: go build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
